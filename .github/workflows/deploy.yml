name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href "/stonks/" --dart-define=SUPABASE_URL=https://bbxcfgraxyibbpjcqhaa.supabase.co --dart-define=SUPABASE_ANON_KEY=sb_publishable_BH2BlPJ4cXEkoUJaSnOyfA_Sh6QmblM

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - id: deploy
        uses: actions/deploy-pages@v4
